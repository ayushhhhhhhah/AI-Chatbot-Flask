<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#111827,#1e293b,#0f172a);
    overflow:hidden;
}

/* Background Glow */
body::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#10b981;
    border-radius:50%;
    filter:blur(150px);
    top:-100px;
    left:-100px;
    opacity:0.4;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#3b82f6;
    border-radius:50%;
    filter:blur(150px);
    bottom:-100px;
    right:-100px;
    opacity:0.4;
}

.signup-box{
    width:400px;
    padding:40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:25px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0px 8px 32px rgba(0,0,0,0.3);
    z-index:10;
}

.signup-box h2{
    text-align:center;
    color:white;
    margin-bottom:10px;
    font-size:32px;
}

.signup-box p{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:18px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:15px;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

.signup-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#10b981,#2563eb);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.signup-btn:hover{
    transform:scale(1.03);
    opacity:0.9;
}

.login-link{
    text-align:center;
    margin-top:20px;
    color:#cbd5e1;
}

.login-link a{
    color:#60a5fa;
    text-decoration:none;
    font-weight:bold;
}

.login-link a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="signup-box">

    <h2>Create Account 🚀</h2>

    <p>Signup and start chatting with AI</p>

    <form action="/signin" method="POST">

        <div class="input-box">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-box">
            <input type="email" name="email" placeholder="Email Address" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="signup-btn">
            Signup
        </button>

    </form>

    <div class="login-link">
        Already have an account?
        <a href="/">Login</a>
    </div>

</div>

</body>
</html>
