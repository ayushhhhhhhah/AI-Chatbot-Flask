<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b,#111827);
    overflow:hidden;
}

/* Background Glow */
body::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#2563eb;
    border-radius:50%;
    filter:blur(150px);
    top:-100px;
    left:-100px;
    opacity:0.4;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#7c3aed;
    border-radius:50%;
    filter:blur(150px);
    bottom:-100px;
    right:-100px;
    opacity:0.4;
}

.login-box{
    width:380px;
    padding:40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:25px;
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0px 8px 32px rgba(0,0,0,0.3);
    z-index:10;
}

.login-box h2{
    text-align:center;
    color:white;
    margin-bottom:10px;
    font-size:32px;
}

.login-box p{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:15px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:15px;
}

.input-box input::placeholder{
    color:#cbd5e1;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    transform:scale(1.03);
    opacity:0.9;
}

.signup-link{
    text-align:center;
    margin-top:20px;
    color:#cbd5e1;
}

.signup-link a{
    color:#60a5fa;
    text-decoration:none;
    font-weight:bold;
}

.signup-link a:hover{
    text-decoration:underline;
}

</style>

</head>

<body>

<div class="login-box">

    <h2>Welcome Back </h2>

    <p>Login to continue chatting with AI</p>

    <form action="/login" method="POST">

        <div class="input-box">
            <input type="text" name="username" placeholder="Enter Username" required>
        </div>

        <div class="input-box">
            <input type="password" name="password" placeholder="Enter Password" required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

    </form>

    <div class="signup-link">
        Don't have an account?
        <a href="/signup">Signup</a>
    </div>

    <div class="support-email">
    Need Help? Gmail us at :-
    <a href="mailto:youchaichatbothelp@gmail.com">
            youchaichatbothelp@gmail.com
    </a>
</div>

</div>

</body>
</html>
